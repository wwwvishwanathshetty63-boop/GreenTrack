<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create your GreenTrack account to start tracking your carbon footprint.">
  <title>Login – GreenTrack 🌱</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
</head>
<body>
  <div class="bg-pattern"></div>

  <div class="auth-page">
    <div class="auth-container">
      <!-- Auth Card -->
      <div class="glass-card auth-card" id="authCard">
        <h2 id="authTitle">Welcome Back 👋</h2>
        <p class="subtitle" id="authSubtitle">Sign in to your GreenTrack account</p>

        <!-- Toggle -->
        <div class="auth-toggle" id="authToggle">
          <button class="active" data-tab="login" id="tabLogin">Sign In</button>
          <button data-tab="signup" id="tabSignup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="loginUsername">Username</label>
            <input type="text" class="form-input" id="loginUsername" placeholder="Enter your username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
            Sign In →
          </button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden">
          <div class="form-group">
            <label class="form-label" for="signupUsername">Username</label>
            <input type="text" class="form-input" id="signupUsername" placeholder="Choose a username" required autocomplete="username" minlength="3" maxlength="30">
            <div class="form-error hidden" id="signupUsernameError"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupEmail">Email</label>
            <input type="email" class="form-input" id="signupEmail" placeholder="your@email.com" required autocomplete="email">
            <div class="form-error hidden" id="signupEmailError"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupPassword">Password</label>
            <input type="password" class="form-input" id="signupPassword" placeholder="Min 8 chars, 1 letter + 1 number" required autocomplete="new-password" minlength="8">
            <div class="form-error hidden" id="signupPasswordError"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupConfirm">Confirm Password</label>
            <input type="password" class="form-input" id="signupConfirm" placeholder="Re-enter password" required autocomplete="new-password">
            <div class="form-error hidden" id="signupConfirmError"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="signupBtn">
            Create Account 🌱
          </button>
        </form>
      </div>

      <a href="/" class="auth-back">← Back to Home</a>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
